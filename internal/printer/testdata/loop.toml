[[cases]]
description = "Nested loops"
input = """
LOOP
  WHILE x >= 3 DO
    WHILE y >= 4 DO
      LOOP
        SELECT x, y;
      END LOOP;
    END WHILE;
  END WHILE;
END LOOP;
"""
formatted = """
LOOP
  WHILE x >= 3 DO
    WHILE y >= 4 DO
      LOOP
        SELECT x, y;
      END LOOP;
    END WHILE;
  END WHILE;
END LOOP
"""

