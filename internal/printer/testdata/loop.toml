[[cases]]
description = "FOR...IN with empty body"
input = """
FOR x IN (SELECT 1)
DO
END FOR;
"""
formatted = """
FOR x IN (SELECT 1)
DO
END FOR
"""

[[cases]]
description = "FOR...IN with single line in body"
input = """
FOR x IN (SELECT 1)
DO
  SELECT x;
END FOR
"""
formatted = """
FOR x IN (SELECT 1)
DO
  SELECT x;
END FOR
"""

[[cases]]
description = "FOR...IN with multiple lines in body"
input = """
FOR x IN (SELECT 1, 2, 3)
DO
  SELECT x;
  SELECT y;
  SELECT 1;
END FOR;
"""
formatted = """
FOR x IN (SELECT 1, 2, 3)
DO
  SELECT x;

  SELECT y;

  SELECT 1;
END FOR
"""

[[cases]]
description = "FOR...IN with FROM in query"
input = """
FOR x IN (SELECT col1, col2 FROM tables.table1)
DO
  SELECT x;
END FOR;
"""
formatted = """
FOR x IN (
  SELECT col1, col2
    FROM tables.table1
)
DO
  SELECT x;
END FOR
"""

[[cases]]
description = "FOR...IN with WITH in query"
input = """
FOR x IN (WITH dogs AS (SELECT * FROM animals.dogs) SELECT name, breed FROM dogs)
DO
  SELECT x.name;
  SELECT x.breed;
END FOR;
"""
formatted = """
FOR x IN (
  WITH
    dogs AS (
      SELECT *
        FROM animals.dogs
    )
  SELECT name, breed
    FROM dogs
)
DO
  SELECT x.name;

  SELECT x.breed;
END FOR
"""

[[cases]]
description = "FOR...IN with PIVOT in query"
input = """
FOR x IN (SELECT * FROM t PIVOT(SUM(a), SUM(b) FOR b IN (0, 1)))
DO
  SELECT x;
END FOR;
"""
formatted = """
FOR x IN (
  SELECT *
    FROM t
         PIVOT (
           SUM(a), SUM(b)
           FOR b IN (0, 1)
         )
)
DO
  SELECT x;
END FOR
"""

[[cases]]
description = "FOR...IN with TABLESAMPLE in query"
input = """
FOR x IN (SELECT uId FROM Users TABLESAMPLE RESERVOIR (100 ROWS) REPEATABLE(10))
DO
  SELECT x;
END FOR;
"""
formatted = """
FOR x IN (
  SELECT uid
    FROM Users
         TABLESAMPLE RESERVOIR (100 ROWS) REPEATABLE(10)
)
DO
  SELECT x;
END FOR
"""

[[cases]]
description = "Nested FOR...IN"
input = """
FOR x IN (SELECT 1, 2, 3)
DO
  FOR y IN (SELECT 4, 5)
  DO
    SELECT x;
    SELECT y;
  END FOR;
END FOR;
"""
formatted = """
FOR x IN (SELECT 1, 2, 3)
DO
  FOR y IN (SELECT 4, 5)
  DO
    SELECT x;

    SELECT y;
  END FOR;
END FOR
"""

[[cases]]
description = "FOR...IN inside LOOP"
input = """
LOOP
  FOR y IN (SELECT 1, 2)
  DO
    SELECT y;
  END FOR;
END LOOP;
"""
formatted = """
LOOP
  FOR y IN (SELECT 1, 2)
  DO
    SELECT y;
  END FOR;
END LOOP
"""

[[cases]]
description = "REPEAT inside FOR inside WHILE"
input = """
WHILE TRUE DO
  FOR y IN (SELECT 1, 2)
  DO
    REPEAT
      SELECT 3, 4;
    UNTIL FALSE
    END REPEAT;
  END FOR;
END WHILE;
"""
formatted = """
WHILE TRUE DO
  FOR y IN (SELECT 1, 2)
  DO
    REPEAT
      SELECT 3, 4;

      UNTIL FALSE
    END REPEAT;
  END FOR;
END WHILE
"""

[[cases]]
description = "FOR...IN in lowercase"
input = """
for x in (select 1) do select x; select 2; end for;
"""
formatted = """
FOR x IN (SELECT 1)
DO
  SELECT x;

  SELECT 2;
END FOR
