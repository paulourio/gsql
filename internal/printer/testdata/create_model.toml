[[cases]]
description = "Options is a non-reserved keyword so can be used as an identifier."
input = """
create model options as select 1 x;
"""
formatted = """
CREATE MODEL options
AS (
  SELECT 1 AS x
)
"""

[[cases]]
input = """
create model options OPTIONS (x=y) AS select 1 x;
"""
formatted = """
CREATE MODEL options
OPTIONS (x=y)
AS (
  SELECT 1 AS x
)
"""

[[cases]]
description = "This is parsed as a model named options with an options clause."
input = """
create model options options(x=y) as select 1 x;
"""
formatted = """
CREATE MODEL options
OPTIONS (x=y)
AS (
  SELECT 1 AS x
)
"""

[[cases]]
input = """
create or replace model xyz as (select 1)
"""
formatted = """
CREATE OR REPLACE MODEL xyz
AS (
  SELECT 1
)
"""

[[cases]]
input = """
create model if not exists xyz as (select 1)
"""
formatted = """
CREATE MODEL IF NOT EXISTS xyz
AS (
  SELECT 1
)
"""

[[cases]]
description = "One with everything.  This is not legal, but parses successfully."
input = """
create or replace temporary model if not exists a.b.c options(d=e) as select 1
"""
formatted = """
CREATE OR REPLACE TEMP MODEL IF NOT EXISTS a.b.c
OPTIONS (d=e)
AS (
  SELECT 1
)
"""

[[cases]]
input = """
create model t as
with q as (select 1), q2 as (select * from q)
select * from q2
"""
formatted = """
CREATE MODEL t
AS (
  WITH
    q AS (
      SELECT 1
    ),
    q2 AS (
      SELECT *
        FROM q
    )
  SELECT *
    FROM q2
)
"""

[[cases]]
description = "All remote model clauses"
input = """
create model t1
input (i1 INT64, i2 FLOAT64)
output (o1 BOOL)
remote with connection conn_1
options (abc = def)
"""
formatted = """
CREATE MODEL t1
INPUT (i1 INT64, i2 FLOAT64)
OUTPUT (o1 BOOL)
REMOTE WITH CONNECTION conn_1
OPTIONS (abc=def)
"""

[[cases]]
description = "All clauses"
input = """
create model t1
input (i1 INT64, i2 FLOAT64)
output (o1 BOOL)
transform(a, 2 as b)
remote with connection conn_1
options (abc = def)
as select * from t2;
"""
formatted = """
CREATE MODEL t1
INPUT (i1 INT64, i2 FLOAT64)
OUTPUT (o1 BOOL)
TRANSFORM (
  a,
  2 AS b
)
REMOTE WITH CONNECTION conn_1
OPTIONS (abc=def)
AS (
  SELECT *
    FROM t2
)
"""

[[cases]]
description = "Create model with one query in aliased query list"
input = """
create model m
as
(
  a1 as (select * from t1)
)
"""
formatted = """
CREATE MODEL m
AS (
  a1 AS (
    SELECT *
      FROM t1
  )
)
"""

[[cases]]
description = "Create model with multiple queries in aliased query list"
input = """
create model m
as
(
  a1 as (select * from t1),
  a2 as (select * from t2)
)
"""
formatted = """
CREATE MODEL m
AS (
  a1 AS (
    SELECT *
      FROM t1
  ),
  a2 AS (
    SELECT *
      FROM t2
  )
)
"""

[[cases]]
description = "Create model with select query within parenthesis. It should be treated as ASTQuery."
input = """
create model m
as
(select * from t1)
"""
formatted = """
CREATE MODEL m
AS (
  SELECT *
    FROM t1
)
"""

[[cases]]
description = "Create model with a with clause inside of parenthesis. It should be treated as ASTQuery"
input = """
create model m
as
(with a1 as (select * from t1) select * from a1)
"""
formatted = """
CREATE MODEL m
AS (
  WITH
    a1 AS (
      SELECT *
        FROM t1
    )
  SELECT *
    FROM a1
)
"""

[[cases]]
description = "Create model with aliased query list with WITH clause in the subquery is permitted."
input = """
create model m
as
(
  a1 as (with aa1 as (select * from tt1) select * from aa1),
  a2 as (with aa2 as (select * from tt2) select * from aa2)
)
"""
formatted = """
CREATE MODEL m
AS (
  a1 AS (
    WITH
      aa1 AS (
        SELECT *
          FROM tt1
      )
    SELECT *
      FROM aa1
  ),
  a2 AS (
    WITH
      aa2 AS (
        SELECT *
          FROM tt2
      )
    SELECT *
      FROM aa2
  )
)
"""

