[setup]
[setup.print_options]
soft_max_cols = 80
newline_before_clause = true
align_logical_with_clauses = false
column_list_trailing_comma = "NEVER"
indentation = 1
min_joins_to_separate_in_blocks = 2
function_name_style = "UPPER_CASE"
identifier_style = "AS_IS"
keyword_style = "UPPER_CASE"
type_style = "UPPER_CASE"
bool_style = "AS_IS"
null_style = "AS_IS"
bytes_style = "AS_IS"
string_style = "AS_IS"
hex_style = "UPPER_CASE"

[[cases]]
input = """
from t
|> assert x+1 = 5
|> assert (select true)
|> assert (select * from unnest(values) as x where x is not null)
|> assert false, 'hello'
|> assert x=y, concat(a,b), 17, "xxxx"
"""
formatted = """
FROM t
|> ASSERT x + 1 = 5
|> ASSERT (SELECT TRUE)
|> ASSERT (
            SELECT *
              FROM UNNEST(values) AS x
             WHERE x IS NOT NULL
          )
|> ASSERT FALSE, 'hello'
|> ASSERT x = y, CONCAT(a, b), 17, 'xxxx'
"""

[[cases]]
input = """
from t
|> assert x,
|> assert x,y,
|> assert x,y,z,
"""
formatted = """
FROM t
|> ASSERT x
|> ASSERT x, y
|> ASSERT x, y, z
"""

