[setup]
[setup.print_options]
soft_max_cols = 80
newline_before_clause = true
align_logical_with_clauses = false
column_list_trailing_comma = "NEVER"
indentation = 1
min_joins_to_separate_in_blocks = 2
function_name_style = "UPPER_CASE"
identifier_style = "AS_IS"
keyword_style = "UPPER_CASE"
type_style = "UPPER_CASE"
bool_style = "AS_IS"
null_style = "AS_IS"
bytes_style = "AS_IS"
string_style = "AS_IS"
hex_style = "UPPER_CASE"

[[cases]]
description = "Basic AGGREGATE with multiple columns and aliases."
input = """
select 1 x
|> AGGREGATE count(*), sum(x) as xx
"""
formatted = """
SELECT 1 AS x
|> AGGREGATE
     COUNT(*),
     SUM(x) AS xx
"""

[[cases]]
description = "AGGREGATE with GROUP BY expressions."
input = """
select 1
|> AGGREGATE sum(z), 1+count(x+1) GROUP BY x, y+2, 3
"""
formatted = """
SELECT 1
|> AGGREGATE SUM(z), 1 + COUNT(x + 1)
   GROUP BY x,
            y + 2,
            3
"""

[[cases]]
description = "Window function parses but should be rejected later."
input = """
select 1
|> AGGREGATE 1, x, sum(y) OVER ()
"""
formatted = """
SELECT 1
|> AGGREGATE
     1,
     x,
     SUM(y) OVER ()
"""

[[cases]]
description = "AGGREGATE with hints on GROUP BY."
input = """
select 1
|> AGGREGATE y GROUP @{hint=1} BY x,2,3
"""
formatted = """
SELECT 1
|> AGGREGATE y
   GROUP @{hint=1} BY x, 2, 3
"""

[[cases]]
description = "GROUP BY ()"
input = """
select 1
|> AGGREGATE sum(y) GROUP BY ()
|> AGGREGATE sum(y) GROUP BY y, (), x
"""
formatted = """
SELECT 1
|> AGGREGATE SUM(y)
   GROUP BY ()
|> AGGREGATE SUM(y)
   GROUP BY y, (), x
"""

[[cases]]
description = "AGGREGATE with empty aggregate list"
input = """
select 1
|> AGGREGATE
|> AGGREGATE GROUP BY x
"""
formatted = """
SELECT 1
|> AGGREGATE
|> AGGREGATE
   GROUP BY x
"""

[[cases]]
description = "AGGREGATE with ROLLUP, CUBE, and GROUPING SETS."
input = """
select 1
|> AGGREGATE count(*) GROUP BY ROLLUP(x,y)
|> AGGREGATE GROUP BY GROUPING SETS ((x), (y,z))
|> AGGREGATE xyz GROUP BY GROUPING SETS(CUBE(x,y), (z,z), ROLLUP(a,b));
"""
formatted = """
SELECT 1
|> AGGREGATE COUNT(*)
   GROUP BY ROLLUP (x, y)
|> AGGREGATE
   GROUP BY GROUPING SETS (
              (x),
              (y, z)
            )
|> AGGREGATE xyz
   GROUP BY GROUPING SETS (
              CUBE (x, y),
              (z, z),
              ROLLUP (a, b)
            )
"""

[[cases]]
description = "Aggregate list supports aliases with and without AS"
input = """
select 1
|> AGGREGATE count(*) as x, count(*) z
"""
formatted = """
SELECT 1
|> AGGREGATE
     COUNT(*) AS x,
     COUNT(*) AS z
"""

[[cases]]
description = "Trailing commas are allowed in aggregate list."
input = """
select 1
|> AGGREGATE count(*),
|> AGGREGATE count(*), GROUP BY x
"""
formatted = """
SELECT 1
|> AGGREGATE COUNT(*)
|> AGGREGATE COUNT(*)
   GROUP BY x
"""

[[cases]]
description = "Trailing commas are allowed in the GROUP BY."
input = """
select 1
|> AGGREGATE GROUP BY x,
|> AGGREGATE GROUP BY x, y,
"""
formatted = """
SELECT 1
|> AGGREGATE
   GROUP BY x
|> AGGREGATE
   GROUP BY x, y
"""

[[cases]]
description = "AGGREGATE with dot-star and modifiers (EXCEPT, REPLACE)."
input = """
select 1
|> AGGREGATE x.* except (a,b),
             y.* replace (abc as def),
             z.* except (a) replace (1+2 as ccc)
"""
formatted = """
SELECT 1
|> AGGREGATE
     x.* EXCEPT(a, b),
     y.*
     REPLACE(
       abc AS def
     ),
     z.* EXCEPT(a)
     REPLACE(
       1 + 2 AS ccc
     )
"""

[[cases]]
description = "AGGREGATE with ordering modifiers on GROUP BY."
input = """
select 1
|> AGGREGATE
   GROUP BY
      x,
      x+1 ASC,
      f() DESC,
      z ASC NULLS FIRST,
      zz DESC NULLS LAST,
      a NULLS FIRST,
      aa NULLS LAST
"""
formatted = """
SELECT 1
|> AGGREGATE
   GROUP BY x,
            x + 1 ASC,
            f() DESC,
            z ASC NULLS FIRST,
            zz DESC NULLS LAST,
            a NULLS FIRST,
            aa NULLS LAST
"""

[[cases]]
description = "Order suffixes in the aggregate list."
input = """
from t
|> aggregate count(*) ASC,
             sum(x) alias DESC,
             avg(y) AS alias ASC NULLS FIRST,
             max(distinct z) DESC NULLS LAST,
             nosuffix()
"""
formatted = """
FROM t
|> AGGREGATE
     COUNT(*)                 ASC,
     SUM(x)          AS alias DESC,
     AVG(y)          AS alias ASC NULLS FIRST,
     MAX(DISTINCT z)          DESC NULLS LAST,
     nosuffix()
"""

[[cases]]
description = "Order suffixes are independent of ordering modifiers on the GROUP BY."
input = """
FROM
  t
|> AGGREGATE
     count(*) ASC
   GROUP AND ORDER BY key ASC
"""
formatted = """
FROM t
|> AGGREGATE COUNT(*) ASC
   GROUP AND ORDER BY key ASC
"""

[[cases]]
description = "GROUP AND ORDER BY with grouping modifiers."
input = """
SELECT
  1
|> AGGREGATE
     1
   GROUP AND ORDER BY (), ROLLUP(x), CUBE(x), GROUPING SETS(x)
"""
formatted = """
SELECT 1
|> AGGREGATE 1
   GROUP AND ORDER BY (), ROLLUP (x), CUBE (x), GROUPING SETS (x)
"""

[[cases]]
description = "Ordering modifiers in combination with aliases."
input = """
from x
|> AGGREGATE
   GROUP AND ORDER BY x+1 AS y ASC
"""
formatted = """
FROM x
|> AGGREGATE
   GROUP AND ORDER BY x + 1 AS y ASC
"""

