[[cases]]
description = "GROUP BY aliases without AS."
input = """
select 1
|> AGGREGATE count(*) as x, count(*) z
   GROUP BY x y, x+y xy
"""
formatted = """
SELECT 1
|> AGGREGATE
     COUNT(*) AS x,
     COUNT(*) AS z
   GROUP BY x AS y,
            x + y AS xy
"""

[[cases]]
description = "GROUP BY supports aliases with AS."
input = """
select 1
|> AGGREGATE count(*) as x, count(*) z
   GROUP BY x AS y, z, 1 AS one, x+y AS xy
"""
formatted = """
SELECT 1
|> AGGREGATE
     COUNT(*) AS x,
     COUNT(*) AS z
   GROUP BY x AS y,
            z,
            1 AS one,
            x + y AS xy
"""

