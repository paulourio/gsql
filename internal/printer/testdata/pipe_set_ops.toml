[[cases]]
description = "Complex queries on the rhs, with pipes or without."
input = """
select 1
|> union all
(select * from t where x),
(select 1 |> where y)
"""
formatted = """
SELECT 1
|> UNION ALL
   (
     SELECT *
       FROM t
      WHERE x
   ),
   (
     SELECT 1
     |> WHERE y
   )
"""

