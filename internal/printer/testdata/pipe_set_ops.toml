[[cases]]
description = "Unparenthesized TABLE clauses in pipe set operations should work: UNION ALL"
input = """
TABLE t1
|> UNION ALL
    TABLE t2,
    TABLE t3,
    (FROM t4 |> WHERE condition),
    (TABLE t5)
"""
formatted = """
TABLE t1
|> UNION ALL
   TABLE t2,
   TABLE t3,
   (
     FROM t4
     |> WHERE condition
   ),
   (TABLE t5)
"""

