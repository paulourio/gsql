[[cases]]
input = """
select descriptor(abc), abc.descriptor(),
       func(descriptor(abc), abc.descriptor()),
from func(descriptor(abc), abc.descriptor())
"""
formatted = """
SELECT descriptor(abc),
       abc.descriptor(),
       func(descriptor(abc), abc.descriptor())
  FROM func(
         DESCRIPTOR(abc),
         abc.descriptor()
       )
"""

[[cases]]
input = """
SELECT (1).`new`,
       (1).`new`(),
       (1).`new` AS x,
       `LEFT`(x),
       x.`LEFT`,
       x.`LEFT`(),
       "abc".`LEFT`,
       "abc".`LEFT`(),
       "abc".count().count(DISTINCT).count(DISTINCT 123)
"""
formatted = """
SELECT (1).`new`,
       (1).`new`(),
       (1).`new` AS x,
       `LEFT`(x),
       x.`LEFT`,
       x.`LEFT`(),
       'abc'.`LEFT`,
       'abc'.`LEFT`(),
       'abc'.COUNT().COUNT(DISTINCT).COUNT(DISTINCT 123)
"""

