[[cases]]
description = "Window clauses."
input = """
select * from T
window w1 as (),
       w2 as (partition by a order by b rows current row),
       w3 as (w1),
       w4 as (w1 partition by a order by b rows current row)
"""
formatted = """
SELECT *
  FROM T
WINDOW w1 AS (),
       w2 AS (
         PARTITION BY a
             ORDER BY b
              ROWS CURRENT ROW
       ),
       w3 AS (
         w1
       ),
       w4 AS (
         w1
         PARTITION BY a
             ORDER BY b
              ROWS CURRENT ROW
       )
"""

