[setup]
[setup.print_options]
soft_max_cols = 80
newline_before_clause = true
align_logical_with_clauses = false
column_list_trailing_comma = "NEVER"
indentation = 1
min_joins_to_separate_in_blocks = 2
function_name_style = "UPPER_CASE"
identifier_style = "AS_IS"
keyword_style = "UPPER_CASE"
type_style = "UPPER_CASE"
bool_style = "AS_IS"
null_style = "AS_IS"
bytes_style = "AS_IS"
string_style = "AS_IS"
hex_style = "UPPER_CASE"

[[cases]]
input = """
export model model.name with connection default options(uri="destination");
"""
formatted = """
EXPORT MODEL model.name
WITH CONNECTION DEFAULT
OPTIONS (uri='destination')
"""

[[cases]]
input = """
export model model.name with connection connection_id options(uri="destination");
"""
formatted = """
EXPORT MODEL model.name
WITH CONNECTION connection_id
OPTIONS (uri='destination')
"""

[[cases]]
input = """
export model model.name options(uri = "destination");
"""
formatted = """
EXPORT MODEL model.name
OPTIONS (uri='destination')
"""

[[cases]]
input = """
export model model.name with connection connection_id;
"""
formatted = """
EXPORT MODEL model.name
WITH CONNECTION connection_id
"""
