[setup]
[setup.print_options]
soft_max_cols = 80
newline_before_clause = true
align_logical_with_clauses = false
column_list_trailing_comma = "NEVER"
indentation = 1
min_joins_to_separate_in_blocks = 2
function_name_style = "UPPER_CASE"
identifier_style = "AS_IS"
keyword_style = "UPPER_CASE"
type_style = "UPPER_CASE"
bool_style = "AS_IS"
null_style = "AS_IS"
bytes_style = "AS_IS"
string_style = "AS_IS"
hex_style = "UPPER_CASE"

[[cases]]
input = """
SELECT 1 |> AS t
"""
formatted = """
SELECT 1
|> AS t
"""

[[cases]]
input = """
SELECT 1 x |> AS t
"""
formatted = """
SELECT 1 AS x
|> AS t
"""

[[cases]]
input = """
SELECT 1 |> AS t1 |> AS t2;
"""
formatted = """
SELECT 1
|> AS t1
|> AS t2
"""

[[cases]]
description = "This case is syntactically correct but semantically wrong, since \"t\" is in the inner scope, won't be visible to the follow up pipe select."
input = """
FROM (SELECT 1 AS a |> AS t)
|> SELECT t.a
"""
formatted = """
FROM (
       SELECT 1 AS a
       |> AS t
     )
|> SELECT t.a
"""

[[cases]]
description = "INPUT TABLE will work outside pipe CALL too, but the analyzer will reject it."
input = """
from f(INPUT TABLE)
"""
formatted = """
FROM f(INPUT TABLE)
"""

[[cases]]
input = """
select func(name=>INPUT)
"""
formatted = """
SELECT func(name => input)
"""

[[cases]]
input = """
SELECT 1 x
|> DISTINCT
"""
formatted = """
SELECT 1 AS x
|> DISTINCT
"""

[[cases]]
input = """
CREATE TEMP TABLE t
AS (SELECT 1 AS a |> DISTINCT);
"""
formatted = """
CREATE TEMP TABLE t
AS (
  SELECT 1 AS a
  |> DISTINCT
)
"""

[[cases]]
input = """
SELECT (SELECT 1 AS a |> DISTINCT);
"""
formatted = """
SELECT (
         SELECT 1 AS a
         |> DISTINCT
       )
"""

[[cases]]
description = "Pipe syntax and FOR UPDATE."
input = """
from t for update
|> where a = 5
|> select a, b;
"""
formatted = """
FROM t FOR UPDATE
|> WHERE a = 5
|> SELECT a, b
"""

[[cases]]
input = """
with q1 as (from t1 for update
            |> where key = 5
            |> select key, x),
     q2 as (from q1
            |> extend x*2 as y)
from q2
|> aggregate sum(y)
   group by key;
"""
formatted = """
WITH
  q1 AS (
    FROM t1 FOR UPDATE
    |> WHERE key = 5
    |> SELECT key, x
  ),
  q2 AS (
    FROM q1
    |> EXTEND x * 2 AS y
  )
FROM q2
|> AGGREGATE SUM(y)
   GROUP BY key
"""

