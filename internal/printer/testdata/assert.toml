[setup]
[setup.print_options]
soft_max_cols = 80
newline_before_clause = true
align_logical_with_clauses = true
column_list_trailing_comma = "AUTO"
indentation = 1
min_joins_to_separate_in_blocks = 2
function_name_style = "UPPER_CASE"
identifier_style = "AS_IS"
keyword_style = "UPPER_CASE"
type_style = "UPPER_CASE"
bool_style = "UPPER_CASE"
null_style = "UPPER_CASE"
bytes_style = "AS_IS"
string_style = "AS_IS"

[[cases]]
input = """
assert true
"""
formatted = """
ASSERT TRUE
"""

[[cases]]
input = """
ASSERT(5 + a);
"""
formatted = """
ASSERT (5 + a)
"""

[[cases]]
input = """
ASSERT (SELECT 1) = 1
"""
formatted = """
ASSERT (SELECT 1) = 1
"""

[[cases]]
input = """
ASSERT (SELECT 1) = 1 AS "simple test";
"""
formatted = """
ASSERT (SELECT 1) = 1 AS 'simple test'
"""
